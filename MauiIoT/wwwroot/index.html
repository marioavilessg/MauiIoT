<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>MauiIoT — Asistente IoT</title>
    <base href="/" />

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        surface: {
                            DEFAULT: '#0d1117',
                            50:  '#1a2132',
                            100: '#161c2d',
                            200: '#111827',
                            300: '#0d1117',
                        }
                    },
                    animation: {
                        'led-pulse': 'led-pulse 1.5s ease-in-out infinite',
                        'bounce-dot': 'bounce 0.9s infinite',
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.25s ease-out',
                    },
                    keyframes: {
                        'led-pulse': {
                            '0%, 100%': { opacity: '1', transform: 'scale(1)' },
                            '50%':      { opacity: '0.6', transform: 'scale(0.92)' },
                        },
                        fadeIn: {
                            from: { opacity: '0' },
                            to:   { opacity: '1' },
                        },
                        slideUp: {
                            from: { opacity: '0', transform: 'translateY(8px)' },
                            to:   { opacity: '1', transform: 'translateY(0)' },
                        },
                    },
                }
            }
        }
    </script>

    <!-- Minimal base overrides -->
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="MauiIoT.styles.css" />
    <link rel="icon" href="data:,">
</head>

<body class="dark bg-surface text-white">

    <div class="status-bar-safe-area"></div>

    <div id="app">
        <!-- Splash loading screen -->
        <div style="
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            height:100vh; background:#0d1117; color:#06b6d4; gap:12px; font-family:Inter,sans-serif;">
            <div style="width:40px;height:40px;border:3px solid #06b6d4;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;"></div>
            <span style="font-size:13px;color:#6b7280;">Cargando IoT Assistant…</span>
        </div>
        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    </div>

    <div id="blazor-error-ui"
         style="display:none; position:fixed; bottom:0; left:0; width:100%; background:#1f2a3c;
                border-top:1px solid #ef4444; color:#fca5a5; padding:10px 20px; font-size:13px;
                font-family:Inter,sans-serif; z-index:9999; align-items:center; justify-content:space-between;">
        <span>⚠️ Error inesperado.</span>
        <a href="" style="color:#06b6d4; text-decoration:none;">Recargar</a>
        <a class="dismiss" style="cursor:pointer; color:#6b7280;">✕</a>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>

    <script>
        // Scroll chat to bottom
        window.scrollToBottom = function (elementId) {
            const el = document.getElementById(elementId);
            if (el) {
                el.scrollTo({ top: el.scrollHeight, behavior: 'smooth' });
            }
        };

        // Auto-grow textarea — accepts element ID as string
        window.autoGrow = function (id) {
            const el = document.getElementById(id);
            if (!el) return;
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 128) + 'px';
        };
    </script>

</body>
</html>
